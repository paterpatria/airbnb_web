<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb Adresse-søger</title>
    
    <!-- Eksterne biblioteker (Leaflet CSS) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Vores eget design -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sektion til søgning og knapper -->
    <div id="controls">
        <div id="search-container">
            <input type="text" id="address-search" placeholder="Søg efter en adresse i København..." autocomplete="off">
            <div id="autocomplete-results"></div>
        </div>
        
        <div id="radius-container">
            <label for="radius-slider">Radius: <span id="radius-value">300</span>m</label>
            <input type="range" id="radius-slider" min="100" max="2000" step="25" value="300">
        </div>

        <div id="status-message">Indtast en adresse for at starte</div>
        
        <button id="download-btn">Download CSV</button>
    </div>

    <!-- Main content område med sidepanel og kort -->
    <div id="main-content">
        <div id="sidebar">
            <div id="sidebar-header">Resultater</div>
            <div id="listing-list">
                <p style="padding: 20px; color: #666;">Søg på en adresse for at se lejemål her...</p>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <!-- Skjult billed-preview container -->
    <div id="image-preview">
        <img id="preview-img" src="" alt="Airbnb preview">
    </div>

    <!-- Eksterne biblioteker (Leaflet JS & PapaParse) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Vores egen logik -->
    <script src="script.js"></script>
</body>
</html>
