<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb Adresse-søger</title>
    
    <!-- Eksterne biblioteker (Leaflet CSS) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Vores eget design -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sektion til søgning og knapper -->
    <div id="controls">
        <div id="dataset-container">
            <label for="dataset-select">Datakilde:</label>
            <select id="dataset-select">
                <option value="combined" selected>Kombineret (Standard)</option>
                <option value="insideairbnb_listings_slim.csv">Inside Airbnb (m. billeder)</option>
                <option value="doorstepanalytics_listings.csv">Doorstep Analytics (uden billeder)</option>
            </select>
        </div>

        <div id="search-container">
            <input type="text" id="address-search" placeholder="Søg efter en adresse i København..." autocomplete="off">
            <div id="autocomplete-results"></div>
        </div>
        
        <div id="radius-container">
            <label for="radius-slider">Radius: <span id="radius-value">300</span>m</label>
            <input type="range" id="radius-slider" min="100" max="2000" step="25" value="300">
        </div>

        <div id="status-message">Indtast en adresse for at starte</div>
        
        <button id="download-btn">Download CSV</button>
    </div>

    <!-- Main content område med sidepanel og kort -->
    <div id="main-content">
        <div id="sidebar">
            <div id="sidebar-header">
                <span>Resultater</span>
                <select id="sort-select">
                    <option value="last_review">Sidste anmeldelse</option>
                    <option value="price_asc">Pris (lavest først)</option>
                    <option value="number_of_reviews">Flest anmeldelser</option>
                    <option value="host_name">Værtsnavn (A-Å)</option>
                    <option value="availability_365">Højest tilgængelighed</option>
                </select>
            </div>
            
            <div id="sidebar-tools">
                <input type="file" id="lejerliste-upload" accept=".csv" style="display: none;">
                <button id="match-btn" class="secondary-btn">Match med lejerliste (CSV)</button>
            </div>

            <div id="view-toggle-container" style="display: none; padding: 10px 20px; border-bottom: 1px solid #ddd; background: #fff8f8;">
                <label class="switch-label">
                    <span>Vis kun matches</span>
                    <input type="checkbox" id="match-toggle">
                </label>
                <button id="download-matches-btn" class="secondary-btn" style="margin-top: 10px; background: #e74c3c;">Download Matches CSV</button>
            </div>

            <div id="listing-list">
                <p style="padding: 20px; color: #666;">Søg på en adresse for at se lejemål her...</p>
            </div>
        </div>
        <div id="map-container">
            <div id="map"></div>
            <!-- Skjult billed-preview container - nu placeret relativt til kortet -->
            <div id="image-preview">
                <img id="preview-img" src="" alt="Airbnb preview">
            </div>
        </div>
    </div>

    <!-- Eksterne biblioteker (Leaflet JS & PapaParse) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Vores egen logik -->
    <script src="script.js"></script>
</body>
</html>
